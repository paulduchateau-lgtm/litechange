<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;1,300;1,400&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1200px; height: 630px; overflow: hidden;
  background: #1C1D1A;
  font-family: 'DM Sans', sans-serif;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
body::before {
  content: ''; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 900px; height: 900px;
  background: radial-gradient(circle, rgba(200,255,60,0.06) 0%, transparent 60%);
}
.card {
  position: relative; z-index: 1;
  text-align: center; max-width: 900px; padding: 0 60px;
}
.badge {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 20px; border: 1px solid rgba(240,230,216,0.12); border-radius: 9999px;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.1em;
  text-transform: uppercase; color: #8A9080; margin-bottom: 40px;
}
.badge .dot { width: 6px; height: 6px; background: #C8FF3C; border-radius: 50%; }
.logo {
  font-family: 'Source Serif 4', serif; font-size: 32px; color: #F0E6D8;
  margin-bottom: 32px;
}
.logo .lite { color: #C8FF3C; font-style: italic; font-weight: 300; }
.logo .dot-glow {
  display: inline-block; width: 6px; height: 6px; background: #C8FF3C;
  border-radius: 50%; margin-left: 2px; vertical-align: baseline;
  position: relative; top: -4px;
  box-shadow: 0 0 12px rgba(200,255,60,0.5);
}
h1 {
  font-family: 'Source Serif 4', serif; font-weight: 400;
  font-size: 52px; line-height: 1.2; color: #F0E6D8;
  letter-spacing: -0.02em; margin-bottom: 24px;
}
h1 em { font-style: italic; color: #C8FF3C; font-weight: 300; }
.sub {
  font-size: 18px; color: #8A9080; line-height: 1.6;
  font-family: 'IBM Plex Mono', monospace; font-size: 13px;
  letter-spacing: 0.04em;
}
</style>
</head>
<body>
<div class="card">
  <div class="badge"><span class="dot"></span> Entreprise à mission</div>
  <div class="logo"><span class="lite">lite</span>change<span class="dot-glow"></span></div>
  <h1>Observatoire du <em>changement</em></h1>
  <div class="sub">RECHERCHE ACADÉMIQUE · EXPERTISE TERRAIN · ARCHITECTURE SOLIDE</div>
</div>
</body>
</html>
